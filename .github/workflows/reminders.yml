name: Event reminders

# Free scheduled push reminders — no Firebase Blaze plan needed.
# GitHub Actions triggers the Vercel cron endpoint, which sends FCM pushes.
on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes (UTC; GitHub may delay under load)
  workflow_dispatch: {} # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder check
        run: |
          code=$(curl -s -o /tmp/out.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CRON_URL }}")
          echo "HTTP $code"; cat /tmp/out.txt
          test "$code" = "200"
